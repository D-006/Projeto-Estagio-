# Desenvolvimento: código sincronizado com o host (volumes) + nodemon / Vite HMR.
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml watch
# Frontend: http://localhost:5173  |  Backend: http://localhost:5000

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      PORT: 5000
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-secret-jwt-key-refresh}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-3h}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-3h}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-apppassword}
      DB_NAME: ${DB_NAME:-pc_builder}
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: npm run dev
    develop:
      watch:
        - path: ./backend/package.json
          action: rebuild

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.vite.dev
    ports:
      - '5173:5173'
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_DEV_PROXY_TARGET: http://backend:5000
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
    depends_on:
      - backend

volumes:
  backend_node_modules:
