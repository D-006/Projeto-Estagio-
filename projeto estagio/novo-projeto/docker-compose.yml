version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: pc-builder-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-pc_builder}
      MYSQL_USER: ${DB_USER:-appuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-apppassword}
    ports:
      - '3307:3306'
    volumes:
      - db_data:/var/lib/mysql
      - type: bind
        source: ./backend/schema.sql
        target: /docker-entrypoint-initdb.d/schema.sql
        read_only: true
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER:-appuser}
      - DB_PASSWORD=${DB_PASSWORD:-apppassword}
      - DB_NAME=${DB_NAME:-pc_builder}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data: