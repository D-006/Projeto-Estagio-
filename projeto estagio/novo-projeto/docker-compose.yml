version: '3.9'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key}
    restart: unless-stopped

  frontend:
    build:
      context: .
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped
